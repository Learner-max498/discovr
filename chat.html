<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000; color: white; min-height: 100vh; padding-bottom: 70px;
}
.container { max-width: 500px; margin: 0 auto; padding: 16px; }
.header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(128,0,255,0.22);
}
.header h1 { font-size: 20px; font-weight: 600; }
.new-chat-btn {
    width: 40px; height: 40px; background: #8c36ff;
    border: none; border-radius: 50%; color: white; font-size: 24px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.search-container { margin-bottom: 16px; }
.search-box {
    width: 100%; padding: 12px 16px; background: #1a1a1a;
    border: 1px solid rgba(128,0,255,0.22); border-radius: 30px;
    color: white; font-size: 15px; outline: none;
}
.search-box:focus { border-color: #8c36ff; background: #111; }
.conversation-card {
    background: rgba(128,0,255,0.08); border: 1px solid rgba(128,0,255,0.22); border-radius: 16px;

.conversation-card:hover { background: rgba(128,0,255,0.12); }
.convo-avatar {
    width: 52px; height: 52px; border-radius: 50%; background: #8c36ff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 18px; overflow: hidden; flex-shrink: 0; position: relative;
    cursor: pointer;
}
.convo-avatar img { width: 100%; height: 100%; object-fit: cover; }
.online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: #00cc88;
    border-radius: 50%;
    border: 2px solid #000;
    box-shadow: 0 0 4px #00cc88;
}
.unread-badge {
    position: absolute; top: -4px; right: -4px; min-width: 20px; height: 20px;
    background: #25D366; border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; color: white;
    padding: 0 5px; border: 2px solid #000; z-index: 2;
}
.convo-info { flex: 1; min-width: 0; }
.convo-name-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.convo-name { font-weight: 600; font-size: 16px; }
.convo-status { font-size: 11px; color: #aaa; }
.convo-preview { font-size: 13px; color: #c7b2ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.convo-preview.unread { color: #e0d0ff; font-weight: 500; }
.convo-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.convo-time { font-size: 11px; color: #888; white-space: nowrap; }
.convo-time.unread { color: #25D366; }
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; }
.modal.show { display: flex; flex-direction: column; }
.modal-header {
    padding: 16px; border-bottom: 1px solid rgba(128,0,255,0.22); display: flex;
    align-items: center; gap: 16px; flex-shrink: 0;
}
.modal-header h2 { font-size: 18px; font-weight: 600; margin:0; }
.modal-header .status-text { font-size: 12px; color: #aaa; margin-left: 8px; font-weight: normal; }
.back-btn { background: none; border: none; color: #8c36ff; font-size: 20px; cursor: pointer; }
.chat-messages {
    flex: 1; overflow-y: auto; padding: 12px 12px;
    display: flex; flex-direction: column; gap: 8px;
    width: 100%; overflow-x: hidden;
    background: #0d0d0d;
}
.message { display: flex; flex-direction: column; max-width: 82%; }
.message.sent { align-self: flex-end; }
.message.received { align-self: flex-start; }
.message-bubble {
    padding: 8px 12px;
    border-radius: 18px;
    word-wrap: break-word;
    font-size: 15px;
    line-height: 1.45;
}
.message.sent .message-bubble { background: #7a22ff; border-bottom-right-radius: 4px; color: #fff; }
.message.received .message-bubble { background: #1e1e2e; border: 1px solid rgba(128,0,255,0.25); border-bottom-left-radius: 4px; color: #f0eaff; }
.message-footer {
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
    font-size: 10px; color: rgba(255,255,255,0.5);
}
.message.sent .message-footer { justify-content: flex-end; }
.message.received .message-footer { justify-content: flex-start; }
.message-time { font-size: 10px; color: rgba(255,255,255,0.5); }
.msg-tick { font-size: 11px; line-height: 1; display: inline-flex; align-items: center; }
.msg-tick.seen { color: #c49eff; }
.reply-quote {
    background: rgba(0,0,0,0.25); border-left: 3px solid #d4aaff;
    border-radius: 4px 10px 10px 4px; padding: 6px 10px 5px 10px;
    margin-bottom: 7px; max-width: 100%; overflow: hidden; cursor: default;
}
.message.sent .reply-quote { background: rgba(0,0,0,0.28); border-left-color: #e0c8ff; }
.message.received .reply-quote { background: rgba(128,0,255,0.18); border-left-color: #9d5cff; }
.reply-quote-name { font-size: 11.5px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.message.sent .reply-quote-name { color: #e0c8ff; }
.message.received .reply-quote-name { color: #b07fff; }
.reply-quote-text { font-size: 12.5px; color: rgba(255,255,255,0.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35; }
.swipe-wrapper { position: relative; display: flex; flex-direction: column; }
.reply-icon {

// ─── CUSTOM CONFIRM MODAL ─────────────────────────────────────────────────────
let pendingConfirmCallback = null;
function customConfirm(message) {
    return new Promise((resolve) => {
        document.getElementById('confirmMessage').textContent = message;
        document.getElementById('customConfirmModal').classList.add('show');
        pendingConfirmCallback = resolve;
    });
}
document.getElementById('confirmOkBtn').onclick = () => {
    document.getElementById('customConfirmModal').classList.remove('show');
    if (pendingConfirmCallback) pendingConfirmCallback(true);
};
document.getElementById('confirmCancelBtn').onclick = () => {
    document.getElementById('customConfirmModal').classList.remove('show');
    if (pendingConfirmCallback) pendingConfirmCallback(false);
};

// ─── HELPER FUNCTIONS ────────────────────────────────────────────────────────
function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
function formatConvoTime(iso) {
    if (!iso) return '';
    const d = new Date(iso), now = new Date(), dm = Math.floor((now - d) / 60000);
    if (dm < 1) return 'now';
    if (dm < 60) return `${dm}m`;
    const dh = Math.floor(dm / 60);
    if (dh < 24) return `${dh}h`;
    const dd = Math.floor(dh / 24);
    if (dd < 7) return `${dd}d`;
    return d.toLocaleDateString([], { day: 'numeric', month: 'short' });
}
function isOnline(lastSeen) {
    if (!lastSeen) return false;
    return (Date.now() - new Date(lastSeen).getTime()) < 2 * 60 * 1000;
}
function formatLastSeen(lastSeen, showExact = true) {
    if (!lastSeen) return 'Never';
    if (!showExact) return 'Hidden';
    if (isOnline(lastSeen)) return 'Online now';
    const now = new Date();
    const then = new Date(lastSeen);
    const diffDays = Math.floor((now - then) / (1000 * 60 * 60 * 24));
    if (diffDays === 0) return then.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (diffDays === 1) return 'Yesterday';
    if (diffDays < 7) {
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        return days[then.getDay()];
    }
    return then.toLocaleDateString();
}
async function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') await Notification.requestPermission();
}

// ─── USER SELECT MODAL ───────────────────────────────────────────────────────

}
function hideUserSelect() {
    document.getElementById('userSelectModal').classList.remove('show');
    document.getElementById('userSearchInput').value = '';

function filterUserList() {

async function startNewChat(userId) {

// ─── BLOCK / UNBLOCK / CLEAR CHAT (one‑sided, with custom confirm) ────────────
async function getBlockStatus(targetId) {
    const { data, error } = await sb.from('blocks').select('*')
        .or(`and(blocker_id.eq.${currentUser.id},blocked_id.eq.${targetId}),and(blocker_id.eq.${targetId},blocked_id.eq.${currentUser.id})`);
    if (error || !data || !data.length) return { blocked: false, iAmBlocker: false };
    const myBlock = data.find(r => r.blocker_id === currentUser.id);
    return { blocked: true, iAmBlocker: !!myBlock };
}
async function blockUser(targetId, targetName) {
    const ok = await customConfirm(`Block ${targetName}? You will no longer receive messages from them and cannot send messages.`);
    if (!ok) return;
    const { error } = await sb.from('blocks').insert({ blocker_id: currentUser.id, blocked_id: targetId });
    if (error) { showToast('Failed to block user', 'error'); return; }
    showToast(`Blocked ${targetName}`, 'success');
    if (chatUser && chatUser.id === targetId) {
        isBlocked = true;
        iBlockedThem = true;
        rebuildChatInput();
    }
}
async function unblockUser(targetId, targetName) {
    const ok = await customConfirm(`Unblock ${targetName}?`);
    if (!ok) return;
    const { error } = await sb.from('blocks').delete()
        .eq('blocker_id', currentUser.id).eq('blocked_id', targetId);
    if (error) { showToast('Failed to unblock user', 'error'); return; }
    showToast(`Unblocked ${targetName}`, 'success');
    if (chatUser && chatUser.id === targetId) {
        isBlocked = false;
        iBlockedThem = false;
        rebuildChatInput();
    }
}
async function clearChatForMe(targetId, targetName) {
    const ok = await customConfirm(`Delete all messages between you and ${targetName} for YOU ONLY? The other user will still see the messages.`);
    if (!ok) return;
    const { data: messages } = await sb.from('messages').select('id')
        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${targetId}),and(sender_id.eq.${targetId},receiver_id.eq.${currentUser.id})`);
    if (!messages || messages.length === 0) { showToast('No messages to clear', 'error'); return; }
    const updates = messages.map(msg => {
        return sb.from('messages').update({
            hidden_for: sb.sql`array_append(COALESCE(hidden_for, '{}'), ${currentUser.id})`
        }).eq('id', msg.id);
    });
    await Promise.all(updates);
    showToast('Chat cleared (only for you)', 'success');
    if (chatUser && chatUser.id === targetId && document.getElementById('chatModal').classList.contains('show')) {
        await loadInitialMessages();
    }
    await loadConversations();
}
function rebuildChatInput() {
    const inputContainer = document.getElementById('chatInputContainer');
    if (!inputContainer) return;
    if (isBlocked) {
        if (iBlockedThem) {
            // I blocked them – show message with Unblock button
            inputContainer.innerHTML = `
                <div style="text-align:center; padding:16px; color:#ff4444; font-size:13px; margin-bottom:8px;">
                    You blocked this user. Unblock them to send messages.
                </div>
                <button id="unblockFromChatBtn" style="width:100%; padding:12px; background:#8c36ff; border:none; border-radius:12px; color:white; font-weight:600; cursor:pointer;">
                    Unblock User
                </button>
            `;
            const unblockBtn = document.getElementById('unblockFromChatBtn');
            if (unblockBtn) {
                unblockBtn.onclick = async () => {
                    await unblockUser(chatUser.id, chatUser.name);
                    rebuildChatInput();
                };
            }
        } else {
            // They blocked me
            inputContainer.innerHTML = `<div style="text-align:center; padding:16px; color:#ff4444; font-size:13px;">You have been blocked by this user.</div>`;
        }
    } else {
        inputContainer.innerHTML = `
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        `;
        const newInput = document.getElementById('messageInput');
        if (newInput) newInput.focus();
    }
}

// ─── LONG PRESS / CONTEXT MENU ───────────────────────────────────────────────
let longPressTimer = null, longPressActive = false;
function startLongPress(event, userId, userName) {
    longPressActive = true;
    longPressTimer = setTimeout(() => {
        if (longPressActive) onConversationLongPress(userId, userName, event);
    }, 500);
}
function cancelLongPress() {
    longPressActive = false;
    if (longPressTimer) clearTimeout(longPressTimer);
}
function endLongPress() { cancelLongPress(); }
async function onConversationLongPress(userId, userName, event) {
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextMenuOverlay');
    const x = event.touches ? event.touches[0].clientX : event.clientX;

function hideContextMenu() {

    document.getElementById('contextMenuOverlay').style.display = 'none';
}
document.getElementById('contextMenuOverlay').addEventListener('click', hideContextMenu);
document.getElementById('blockUserBtn').addEventListener('click', async () => {

// ─── CONVERSATIONS ───────────────────────────────────────────────────────────
async function loadConversations() {
    const { data: msgs, error } = await sb.from('messages').select('*')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    if (!msgs?.length) {
        document.getElementById('conversationsList').innerHTML = '<div class="empty-state">No conversations yet</div>';
        updateNavBadge(0);
        allConversations = [];
        return;
    }
    const visibleMsgs = msgs.filter(m => !(m.hidden_for && m.hidden_for.includes(currentUser.id)));
    const convsMap = new Map();
    for (const m of visibleMsgs) {
        const otherId = m.sender_id === currentUser.id ? m.receiver_id : m.sender_id;
        if (!convsMap.has(otherId))
            convsMap.set(otherId, { otherId, lastMsg: m.content || '📎 Attachment', lastTime: m.created_at, unreadCount: 0 });
        if (m.receiver_id === currentUser.id && !m.seen) {
            const lr = lastReadAt[otherId] || '1970-01-01';
            if (m.created_at > lr) convsMap.get(otherId).unreadCount++;
        }
    }
    const ids = Array.from(convsMap.keys());
    const { data: ud } = await sb.from('users').select('id,name,last_seen,avatar_url,initials,show_online_status').in('id', ids);
    const um = (ud || []).reduce((a,u) => { a[u.id] = u; return a; }, {});
    const list = Array.from(convsMap.values())
        .map(c => ({ ...c, user: um[c.otherId] }))
        .filter(c => c.user)
        .sort((a,b) => b.unreadCount !== a.unreadCount ? b.unreadCount - a.unreadCount : new Date(b.lastTime) - new Date(a.lastTime));
    updateNavBadge(list.reduce((s,c) => s + c.unreadCount, 0));
    allConversations = list;
    filterConversations();
}
function filterConversations() {
    const term = document.getElementById('chatSearchInput').value.toLowerCase().trim();
    if (!term) renderConversations(allConversations);
    else renderConversations(allConversations.filter(c => c.user.name.toLowerCase().includes(term)));
}
function renderConversations(conversations) {
    const container = document.getElementById('conversationsList');
    if (!conversations.length) {
        container.innerHTML = '<div class="empty-state">No conversations found</div>';
        return;
    }
    container.innerHTML = conversations.map(c => {
        const u = c.user, hasUnread = c.unreadCount > 0;
        const showStatus = u.show_online_status !== false;
        const online = showStatus && isOnline(u.last_seen);
        const av = u.avatar_url ? `<img src="${u.avatar_url}">` : (u.initials || '?');
        const badge = hasUnread ? `<div class="unread-badge">${c.unreadCount > 99 ? '99+' : c.unreadCount}</div>` : '';
        const preview = (c.lastMsg || '').substring(0,40) + (c.lastMsg?.length > 40 ? '…' : '');
        let statusText = '';
        if (showStatus && online) statusText = 'Online';
        else if (showStatus && u.last_seen) statusText = formatLastSeen(u.last_seen);
        else if (!showStatus) statusText = 'Offline';
        return `<div class="conversation-card"
            ontouchstart="startLongPress(event, '${u.id}', '${escapeHtml(u.name).replace(/'/g, "&#39;")}')"
            ontouchmove="cancelLongPress()"
            ontouchend="endLongPress(event)"
            onmousedown="startLongPress(event, '${u.id}', '${escapeHtml(u.name).replace(/'/g, "&#39;")}')"
            onmousemove="cancelLongPress()"
            onmouseup="endLongPress(event)">
            <div class="convo-avatar" onclick="event.stopPropagation(); viewChatAvatar('${u.id}', '${escapeHtml(u.name).replace(/'/g, "&#39;")}')">
                ${av}
                ${online ? '<div class="online-dot"></div>' : ''}
                ${badge}
            </div>
            <div class="convo-info" onclick="openChatWithUser('${u.id}')">
                <div class="convo-name-row">
                    <span class="convo-name">${escapeHtml(u.name)}</span>
                    <span class="convo-status">${statusText}</span>
                </div>
                <div class="convo-preview${hasUnread ? ' unread' : ''}">${escapeHtml(preview)}</div>
            </div>
            <div class="convo-meta"><span class="convo-time${hasUnread ? ' unread' : ''}">${formatConvoTime(c.lastTime)}</span></div>
        </div>`;
    }).join('');
}
function updateNavBadge(n) {
    const badge = document.getElementById('chatNavBadge');
    if (n > 0) { badge.textContent = n > 99 ? '99+' : n; badge.style.display = 'flex'; }
    else badge.style.display = 'none';
}
function markRead(id) {

}

// ─── CHAT MODAL ──────────────────────────────────────────────────────────────
async function updateChatHeaderStatus() {
    if (!chatUser) return;
    const { data: user } = await sb.from('users').select('last_seen, show_online_status').eq('id', chatUser.id).single();
    if (user) {
        const showStatus = user.show_online_status !== false;
        const online = showStatus && isOnline(user.last_seen);
        let statusText = '';
        if (showStatus && online) statusText = 'Online now';

        document.getElementById('chatStatusText').textContent = statusText;
    }

async function openChatModal() {
    if (!chatUser) return;
    const blockStatus = await getBlockStatus(chatUser.id);
    isBlocked = blockStatus.blocked;
    iBlockedThem = blockStatus.iAmBlocker;
    document.getElementById('chatTitle').textContent = chatUser.name;
    updateChatHeaderStatus();
    if (window.chatStatusInterval) clearInterval(window.chatStatusInterval);
    window.chatStatusInterval = setInterval(updateChatHeaderStatus, 30000);

    await markMessagesAsSeen(chatUser.id, currentUser.id);

    rebuildChatInput();
    subscribeToSeenUpdates();
    messagesSubscription = sb.channel(`chat-${currentUser.id}-${chatUser.id}`)
        .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'messages',
            filter: `receiver_id=eq.${currentUser.id}`
        }, payload => {
            if (payload.new?.sender_id === chatUser.id) {
                sb.from('messages').update({ seen: true }).eq('id', payload.new.id).then(() => {});
                appendMessageToChat(payload.new);
                playMessageSound();
                markRead(chatUser.id);
                if (document.visibilityState !== 'visible')
                    showBrowserNotification(`New message from ${chatUser.name}`, payload.new.content || '📎 Attachment');
            }
        }).subscribe();
}
window.closeChat = () => {
    if (window.chatStatusInterval) clearInterval(window.chatStatusInterval);
    document.getElementById('chatModal').classList.remove('show');
    if (messagesSubscription) { sb.removeChannel(messagesSubscription); messagesSubscription = null; }
    if (seenSubscription) { sb.removeChannel(seenSubscription); seenSubscription = null; }
    chatUser = null; messagesCache = []; clearReply(); loadConversations();
};

// ─── MESSAGE RENDERING ───────────────────────────────────────────────────────
function renderMessageHtml(m) {
    const isSent = m.sender_id === currentUser.id;
    const dir = isSent ? 'sent' : 'received';
    let fileHtml = '';
    if (m.file_url) {
        if (m.file_type === 'image')
            fileHtml = `<div style="margin-top:6px;"><img src="${m.file_url}" style="max-width:220px;border-radius:10px;display:block;cursor:pointer;" onclick="event.stopPropagation(); openMediaViewer('${m.file_url}','image')"></div>`;
        else if (m.file_type === 'video')
            fileHtml = `<div style="margin-top:6px;"><video controls style="max-width:220px;border-radius:10px;cursor:pointer;" onclick="event.stopPropagation(); openMediaViewer('${m.file_url}','video')"><source src="${m.file_url}"></video></div>`;
        else
            fileHtml = `<div style="margin-top:6px;"><a href="${m.file_url}" target="_blank" style="color:#c49eff;">📎 Download file</a></div>`;
    }
    let quoteHtml = '';
    if (m.reply_to_content) {
        let quoteName = '', quoteText = m.reply_to_content;
        const atMatch = m.reply_to_content.match(/^@([^:]+):\s*(.*)$/);
        if (atMatch) { quoteName = atMatch[1]; quoteText = atMatch[2]; }
        else quoteName = isSent ? (chatUser?.name || '') : (currentUser?.name || 'You');
        const truncated = quoteText.length > 80 ? quoteText.substring(0,80)+'…' : quoteText;
        quoteHtml = `<div class="reply-quote"><div class="reply-quote-name">${escapeHtml(quoteName)}</div><div class="reply-quote-text">${escapeHtml(truncated)}</div></div>`;
    }
    const timeStr = new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const safeContent = (m.content||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const safeName = escapeHtml(isSent ? (currentUser?.name||'You') : (chatUser?.name||''));
    let tickHtml = '';
    if (isSent) tickHtml = `<span class="msg-tick ${m.seen ? 'seen' : ''}" id="tick-${m.id}" title="${m.seen ? 'Seen' : 'Sent'}">${m.seen ? '<i class="fas fa-check-double"></i>' : '<i class="fas fa-check"></i>'}</span>`;
    return `<div class="message ${dir}" data-msg-id="${m.id}">
        <div class="swipe-wrapper">
            <div class="reply-icon">↩</div>
            <div class="bubble-inner" data-content="${safeContent}" data-sender-name="${safeName}">
                <div class="message-bubble">
                    ${quoteHtml}
                    <span>${escapeHtml(m.content||'')}</span>
                    ${fileHtml}
                </div>
                <div class="message-footer">
                    <span class="message-time">${timeStr}</span>
                    ${tickHtml}
                </div>
            </div>
        </div>
    </div>`;
}
async function loadInitialMessages() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '<div class="empty-state">Loading messages...</div>';
    const { data } = await sb.from('messages').select('*')
        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${chatUser.id}),and(sender_id.eq.${chatUser.id},receiver_id.eq.${currentUser.id})`)
        .order('created_at', { ascending: true });
    messagesCache = (data || []).filter(m => !(m.hidden_for && m.hidden_for.includes(currentUser.id)));
    if (!messagesCache.length) container.innerHTML = '<div class="empty-state">Say hello! 👋</div>';
    else {
        container.innerHTML = messagesCache.map(m => renderMessageHtml(m)).join('');
        container.scrollTop = container.scrollHeight;
        attachSwipeListeners();
    }
}
function appendMessageToChat(msg) {
    if (messagesCache.some(m => m.id === msg.id)) return;
    if (msg.sender_id === chatUser.id && !msg.seen) msg.seen = true;
    messagesCache.push(msg);
    const container = document.getElementById('chatMessages');
    container.insertAdjacentHTML('beforeend', renderMessageHtml(msg));
    container.scrollTop = container.scrollHeight;
    attachSwipeListeners();
}
function attachSwipeListeners() {
    document.querySelectorAll('.bubble-inner').forEach(inner => {
        if (inner._swipeAttached) return;
        inner._swipeAttached = true;
        const wrapper = inner.closest('.swipe-wrapper');
        if (!wrapper) return;
        const icon = wrapper.querySelector('.reply-icon');
        let startX = 0, startY = 0, dx = 0, active = false, triggered = false;
        const TRIGGER = 70, MAX = 90;
        inner.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            dx = 0; active = false; triggered = false; inner.classList.remove('dragging');
        }, { passive: true });
        inner.addEventListener('touchmove', e => {
            const mx = e.touches[0].clientX - startX;
            const my = e.touches[0].clientY - startY;
            if (!active) {
                if (Math.abs(mx) < 6 && Math.abs(my) < 6) return;
                if (Math.abs(my) > Math.abs(mx) || mx <= 0) return;
                active = true; inner.classList.add('dragging');
            }
            e.preventDefault();
            dx = Math.max(0, Math.min(mx, MAX));
            inner.style.transform = `translateX(${dx}px)`;
            icon.style.opacity = String(Math.min(dx / TRIGGER, 1));
            if (dx >= TRIGGER && !triggered) {
                triggered = true;
                if (navigator.vibrate) navigator.vibrate(35);
                icon.style.opacity = '1';
            }
        }, { passive: false });
        const end = () => {
            if (!active) return;
            active = false; inner.classList.remove('dragging');
            inner.style.transform = ''; icon.style.opacity = '0';
            if (triggered) {
                const content = inner.dataset.content || '';
                const senderName = inner.dataset.senderName || '';
                setReply(content, senderName);
            }
        };
        inner.addEventListener('touchend',    end, { passive: true });
        inner.addEventListener('touchcancel', end, { passive: true });
    });
}
function setReply(content, senderName) {
    replyToContent = content;
    replyToSenderName = senderName;
    const preview = content.length > 60 ? content.substring(0,60)+'…' : content;
    document.getElementById('replyBarName').textContent = senderName || '';
    document.getElementById('replyBarText').textContent = preview;
    document.getElementById('replyBar').classList.add('show');
    const inp = document.getElementById('messageInput');
    if (inp) inp.focus();
}
function clearReply() {
    replyToContent = null;
    replyToSenderName = null;
    document.getElementById('replyBar').classList.remove('show');
    document.getElementById('replyBarName').textContent = '';
    document.getElementById('replyBarText').textContent = '';
}
async function markMessagesAsSeen(senderId, receiverId) {
    await sb.from('messages').update({ seen: true })
        .eq('sender_id', senderId).eq('receiver_id', receiverId).eq('seen', false);
}
function subscribeToSeenUpdates() {
    if (seenSubscription) sb.removeChannel(seenSubscription);
    if (!chatUser) return;
    seenSubscription = sb.channel(`seen-${currentUser.id}-${chatUser.id}`)
        .on('postgres_changes', {
            event: 'UPDATE', schema: 'public', table: 'messages',
            filter: `sender_id=eq.${currentUser.id}`
        }, payload => {
            if (payload.new?.seen === true) {
                const msgId = payload.new.id;
                const msg = messagesCache.find(m => m.id === msgId);
                if (msg) msg.seen = true;
                const tickEl = document.getElementById(`tick-${msgId}`);
                if (tickEl) {
                    tickEl.className = 'msg-tick seen';
                    tickEl.title = 'Seen';
                    tickEl.innerHTML = '<i class="fas fa-check-double"></i>';
                }
            }
        }).subscribe();
}
function playMessageSound() {
    if (localStorage.getItem('disco_sound') === 'false') return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
}
function showBrowserNotification(title, body) {
    if (Notification.permission === 'granted')
        new Notification(title, { body, icon: '/icons/icon-192.png', silent: false });
}
window.handleFileSelect = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 50 * 1024 * 1024) { showToast('File exceeds 50MB limit', 'error'); e.target.value=''; return; }
    selectedFile = f;
    const preview = document.getElementById('attachmentPreview');
    const thumbImg = document.getElementById('attachThumb');
    const thumbVideo = document.getElementById('attachVideo');
    const infoDiv = document.getElementById('attachInfo');
    if (f.type.startsWith('image/')) {
        thumbImg.style.display = 'block'; thumbVideo.style.display = 'none';
        const reader = new FileReader();
        reader.onload = ev => { thumbImg.src = ev.target.result; };
        reader.readAsDataURL(f);
        infoDiv.textContent = f.name;
    } else if (f.type.startsWith('video/')) {
        thumbImg.style.display = 'none'; thumbVideo.style.display = 'block';
        const url = URL.createObjectURL(f);
        thumbVideo.src = url; thumbVideo.controls = false;
        infoDiv.textContent = f.name;
    } else {
        thumbImg.style.display = 'none'; thumbVideo.style.display = 'none';
        infoDiv.textContent = f.name;
    }
    preview.classList.add('active');
};
window.removeAttachment = () => {
    selectedFile = null;
    document.getElementById('attachmentPreview').classList.remove('active');
    document.getElementById('fileInput').value = '';
};
window.sendMessage = async () => {
    if (isBlocked) { showToast('Cannot send messages to this user.', 'error'); return; }
    const input = document.getElementById('messageInput');
    if (!input) return;
    const content = input.value.trim();
    if (!content && !selectedFile) return;
    const btn = document.querySelector('#chatInputContainer button:last-child');
    if (btn) btn.disabled = true;
    let fileUrl = null, fileType = null;
    if (selectedFile) {
        const ext = selectedFile.name.split('.').pop();
        const path = `${currentUser.id}/${Date.now()}.${ext}`;
        const { error: upErr } = await sb.storage.from('chat').upload(path, selectedFile);
        if (upErr) { showToast('File upload failed', 'error'); if (btn) btn.disabled=false; return; }
        fileUrl = sb.storage.from('chat').getPublicUrl(path).data.publicUrl;
        fileType = selectedFile.type.startsWith('image/') ? 'image' : selectedFile.type.startsWith('video/') ? 'video' : 'file';
    }
    const payload = {
        sender_id: currentUser.id, receiver_id: chatUser.id, content: content || '',
        file_url: fileUrl, file_type: fileType, seen: false
    };
    if (replyToContent) payload.reply_to_content = (replyToSenderName ? `@${replyToSenderName}: ` : '') + replyToContent;
    const tempId = 'temp_' + Date.now();
    const optimistic = { id: tempId, ...payload, created_at: new Date().toISOString() };
    appendMessageToChat(optimistic);
    input.value = '';
    removeAttachment();
    clearReply();
    const { data: realMsg, error } = await sb.from('messages').insert(payload).select().single();
    if (error) {
        showToast('Failed to send message', 'error');
        messagesCache = messagesCache.filter(m => m.id !== tempId);
        const optDiv = document.querySelector(`.message[data-msg-id="${tempId}"]`);
        if (optDiv) optDiv.remove();
        if (btn) btn.disabled=false;
        return;
    }
    const idx = messagesCache.findIndex(m => m.id === tempId);
    if (idx !== -1) messagesCache[idx] = realMsg;
    const optDiv = document.querySelector(`.message[data-msg-id="${tempId}"]`);
    if (optDiv) { optDiv.outerHTML = renderMessageHtml(realMsg); attachSwipeListeners(); }
    if (btn) btn.disabled=false;
};
window.handleKeyPress = e => { if (e.key === 'Enter') sendMessage(); };
let currentMediaUrl = '', currentMediaType = '';
window.openMediaViewer = (url, type) => {
    currentMediaUrl = url; currentMediaType = type;
    const content = document.getElementById('mediaViewerContent');
    if (type === 'video') content.innerHTML = `<video controls autoplay src="${url}"></video>`;
    else content.innerHTML = `<img src="${url}">`;
    document.getElementById('mediaViewer').classList.add('show');
};
window.closeMediaViewer = () => { document.getElementById('mediaViewer').classList.remove('show'); };
window.downloadCurrentMedia = () => {
    const a = document.createElement('a');
    a.href = currentMediaUrl;
    a.download = currentMediaType === 'video' ? 'video.mp4' : 'image.jpg';
    a.click();
};
function subscribeToUnreadGlobal() {
    if (unreadSubscription) sb.removeChannel(unreadSubscription);
    if (!currentUser) return;
    unreadSubscription = sb.channel('unread-chat-global')
        .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'messages',
            filter: `receiver_id=eq.${currentUser.id}`
        }, () => {
            loadConversations();
        })
        .subscribe();
}
async function init() {
    currentUser = await getCurrentUser();
    if (!currentUser) { window.location.href = 'index.html'; return; }
    await requestNotificationPermission();
    const lrStored = localStorage.getItem('aou_last_read');
    if (lrStored) Object.assign(lastReadAt, JSON.parse(lrStored));
    if (localStorage.getItem('disco_sound') === null) localStorage.setItem('disco_sound', 'true');
    allUsers = await loadAllUsers();
    await loadConversations();
    subscribeToUnreadGlobal();
    const chatWith = localStorage.getItem('chat_with');
    if (chatWith) {
        const u = allUsers.find(x => x.id === chatWith) || (await sb.from('users').select('*').eq('id', chatWith).single()).data;
        if (u) { chatUser = u; await openChatModal(); }
        localStorage.removeItem('chat_with');
    }
}
init();
</script>

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('SW registration failed:', err));
}
document.addEventListener('backbutton', function(e) {
    if (window.location.pathname !== '/index.html' && history.length > 1) {
        e.preventDefault();
        history.back();
    } else {
        if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
    }
}, false);
