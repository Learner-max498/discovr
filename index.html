<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Discovr">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="theme-color" content="#000000">
<title>Discovr – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background: #000;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.bg { position: fixed; inset: 0; z-index: 0; background: #000; overflow: hidden; }
.leak {
    position: absolute;
    width: 100%; height: 350px;
    top: 0; left: 0;
    background: linear-gradient(180deg, rgba(128,0,255,0.12) 0%, transparent 100%);
}
.bottom-glow {
    position: fixed; bottom: 0; left: 0; right: 0; height: 200px;
    background: linear-gradient(0deg, rgba(128,0,255,0.08) 0%, transparent 100%);
    z-index: 1; pointer-events: none;
}
.page {
    position: relative; z-index: 10;
    width: 100%; max-width: 430px; min-height: 100vh;
    display: flex; flex-direction: column; padding: 0 0 40px;
}
.hero {
    padding: 60px 28px 36px;
    text-align: center;
}
.logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 64px; font-weight: 700; letter-spacing: -3px; line-height: 1;
    color: #8c36ff;
    text-shadow: 0 4px 30px rgba(140,54,255,0.4);
}
.tagline {
    margin-top: 8px; font-size: 13px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,255,255,0.45);
}
.card {
    margin: 0 18px;
    background: rgba(20,20,20,0.8);
    border: 1px solid rgba(128,0,255,0.25);
    border-radius: 28px;
    padding: 28px 22px 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}
.tabs {
    display: flex; background: rgba(0,0,0,0.4);
    border-radius: 14px; padding: 4px; margin-bottom: 24px; gap: 4px;
}
.tab {
    flex: 1; text-align: center; padding: 11px; border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; user-select: none;
}
.tab.active {
    background: #8c36ff;
    color: white;
    box-shadow: 0 2px 12px rgba(140,54,255,0.5);
}
.form { display: none; }
.form.active { display: block; animation: fadeUp 0.25s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.form-title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 800;
    color: white; margin-bottom: 4px;
}
.form-sub {
    font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 20px; line-height: 1.5;
}
.field { margin-bottom: 13px; position: relative; }
.field label {
    display: block; font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 6px;
}
.field input, .field select {
    width: 100%; padding: 13px 15px;
    background: rgba(0,0,0,0.4); border: 1.5px solid rgba(128,0,255,0.25);
    border-radius: 13px; color: white;
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
}
.field input::placeholder { color: rgba(255,255,255,0.3); }
.field input:focus, .field select:focus {
    border-color: #8c36ff;
    background: rgba(0,0,0,0.6);
}
.field select option { background: #000; color: white; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.btn {
    width: 100%; padding: 15px;
    background: #8c36ff; color: white;
    border: none; border-radius: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 800;
    cursor: pointer; margin-top: 6px;
    box-shadow: 0 6px 20px rgba(140,54,255,0.4);
    transition: transform 0.12s, box-shadow 0.12s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.form-footer {
    text-align: center; margin-top: 16px; font-size: 13px;
    color: rgba(255,255,255,0.45);
}
.form-footer a { color: #8c36ff; font-weight: 700; cursor: pointer; text-decoration: none; }
.forgot-link {
    text-align: right;
    margin-bottom: 16px;
    font-size: 13px;
    color: #c7b2ff;
    cursor: pointer;
    width: 100%;
    display: block;
}
.password-toggle {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.2s;
    user-select: none;
    color: #c7b2ff;
    display: flex;
    align-items: center;
    justify-content: center;
}
.password-toggle:hover { opacity: 1; color: #8c36ff; }
.wp-footer { margin-top: 30px; text-align: center; }
.pw-logo {
    display: inline-flex; align-items: center; justify-content: center; gap: 2px;
    animation: footerFloat 3s ease-in-out infinite;
}
.w-small {
    display: inline-block; font-size: 1.8rem; font-weight: 900; letter-spacing: -2px;
    transform: scaleX(1.2); color: #8c36ff;
    text-shadow: 0 0 8px rgba(140,54,255,0.5); line-height: 1;
}
.p-small {
    display: inline-block; font-size: 1.8rem; font-weight: 900; margin-left: -3px;
    position: relative; color: #8c36ff;
    text-shadow: 0 0 8px rgba(140,54,255,0.5); line-height: 1;
}
.p-small::before {
    content: ""; position: absolute; top: -6px; left: 2px;
    width: 7px; height: 7px; background: #8c36ff;
    border-radius: 50%; box-shadow: 0 0 10px #8c36ff;
}
@keyframes footerFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
}
.forgot-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center;
    padding: 20px;
}
.forgot-modal.show { display: flex; }
.forgot-modal-content {
    background: rgba(20,20,20,0.95);
    border: 1px solid rgba(128,0,255,0.25);
    border-radius: 24px; padding: 28px; width: 100%; max-width: 400px;
    backdrop-filter: blur(10px);
}
.forgot-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
}
.forgot-modal-header h2 { font-size: 20px; font-weight: 600; color: #8c36ff; }
.forgot-modal-close { background: none; border: none; color: #c7b2ff; font-size: 24px; cursor: pointer; }
.toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(20,20,20,0.95); color: white; padding: 11px 22px;
    border-radius: 30px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: all 0.28s; z-index: 9000;
    pointer-events: none; max-width: 88%; text-align: center;
    backdrop-filter: blur(10px); border: 1px solid #8c36ff;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err  { background: rgba(180,40,40,0.95); border-color: #ff4444; }
.toast.ok   { background: rgba(0,120,80,0.95); border-color: #00cc88; }
.bsp {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #8c36ff; border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg"><div class="leak"></div></div>
<div class="bottom-glow"></div>
<div class="page">
    <div class="hero">
        <div class="logo">Discovr</div>
        <div class="tagline">Discover your school</div>
    </div>
    <div class="card">
        <div class="tabs">
            <div class="tab active" id="tab-in" onclick="sw('in')">Sign In</div>
            <div class="tab" id="tab-up" onclick="sw('up')">Sign Up</div>
        </div>
        <div class="form active" id="form-in">
            <div class="form-title">Welcome back 👋</div>
            <div class="form-sub">Sign in to your Discovr account</div>
            <div class="field"><label>Email</label><input type="email" id="li-email" placeholder="your@email.com"></div>
            <div class="field"><label>Password</label><input type="password" id="li-pass" placeholder="••••••••" onkeypress="if(event.key==='Enter')login()"></div>
            <span class="forgot-link" onclick="openForgotModal()">Forgot Password?</span>
            <button class="btn" id="li-btn" onclick="login()">Sign In →</button>
            <div class="form-footer">No account? <a onclick="sw('up')">Create one</a></div>
        </div>
        <div class="form" id="form-up">
            <div class="form-title">Join Discovr 🎓</div>
            <div class="form-sub">Use your real details — authenticity matters.</div>
            <div class="field"><label>Full Name</label><input type="text" id="su-name" placeholder="Your full name"></div>
            <div class="field"><label>Email</label><input type="email" id="su-email" placeholder="your@email.com"></div>
            <div class="field"><label>Password</label><input type="password" id="su-pass" placeholder="At least 6 characters"></div>
            <div class="field"><label>School Name</label><input type="text" id="su-school" placeholder="e.g. Victory High School"></div>
            <div class="field-row">
                <div class="field"><label>Class</label><select id="su-class"><option value="">Select</option><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option></select></div>
                <div class="field"><label>Department</label><select id="su-dept"><option value="">Select</option><option>Science</option><option>Art</option><option>Commercial</option></select></div>
            </div>
            <button class="btn" id="su-btn" onclick="register()">Create Account →</button>
            <div class="form-footer">Have an account? <a onclick="sw('in')">Sign in</a></div>
        </div>
    </div>
    <div class="wp-footer"><div class="pw-logo"><span class="w-small">W</span><span class="p-small">P</span></div></div>
</div>

<div class="forgot-modal" id="forgotModal">
    <div class="forgot-modal-content">
        <div class="forgot-modal-header"><h2>Reset Password</h2><button class="forgot-modal-close" onclick="closeForgotModal()">&times;</button></div>
        <div class="field"><label>Email Address</label><input type="email" id="forgotEmail" placeholder="your@email.com"></div>
        <button class="btn" id="forgotBtn" onclick="forgotPassword()">Send Reset Link →</button>
        <div class="form-footer" style="margin-top:12px;">Remember your password? <a onclick="closeForgotModal()">Sign in</a></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script>
const sb = window.supabase.createClient('https://oyeojlvrjhaymbhohxdq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95ZW9qbHZyamhheW1iaG9oeGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzMxNDYsImV4cCI6MjA5MDk0OTE0Nn0.aL-Y0hXjfpSIfqnwX-CDhoYLu5fsaMZPr6wW_VxxYj8');
function toast(msg, type=''){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3200); }
function sw(tab){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.form').forEach(f=>f.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active'); document.getElementById('form-'+tab).classList.add('active'); }
function setBtn(id,loading,label){ const b=document.getElementById(id); b.disabled=loading; b.innerHTML=loading?'<span class="bsp"></span>Please wait…':label; }
async function ensureProfile(uid,email,extra){
    const {data:ex}=await sb.from('users').select('*').eq('id',uid).single(); if(ex)return ex;
    const name=extra?.name||email.split('@')[0]; const initials=name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const {data,error}=await sb.from('users').insert([{id:uid,email,name,school:extra?.school||'Not set',class:extra?.class||'Not set',department:extra?.department||'Not set',initials}]).select().single();
    if(error){console.error(error);return null;} return data;
}
async function login(){
    const email=document.getElementById('li-email').value.trim(), pass=document.getElementById('li-pass').value;
    if(!email||!pass){toast('Please fill in all fields','err');return;}
    setBtn('li-btn',true);
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setBtn('li-btn',false,'Sign In →');toast(error.message,'err');return;}
    const user=await ensureProfile(data.user.id,email,data.user.user_metadata);
    if(user){
        localStorage.setItem('aou_user',JSON.stringify(user));
        if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
        await sb.from('users').update({last_seen:new Date().toISOString()}).eq('id',user.id);
    }
    toast('Welcome back! 👋','ok'); setTimeout(()=>window.location.href='everyone.html',800);
}
async function register(){
    const name=document.getElementById('su-name').value.trim(), email=document.getElementById('su-email').value.trim(), pass=document.getElementById('su-pass').value, school=document.getElementById('su-school').value.trim(), cls=document.getElementById('su-class').value, dept=document.getElementById('su-dept').value;
    if(!name||!email||!pass||!school||!cls||!dept){toast('Please fill in all fields','err');return;}
    if(pass.length<6){toast('Password must be at least 6 characters','err');return;}
    setBtn('su-btn',true);
    let schoolId=null; const {data:existing}=await sb.from('schools').select('id').eq('name',school).single();
    if(existing) schoolId=existing.id; else { const {data:newSchool}=await sb.from('schools').insert({name:school}).select().single(); schoolId=newSchool?.id; }
    if(!schoolId){setBtn('su-btn',false,'Create Account →');toast('Error creating school','err');return;}
    const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name,school,class:cls,department:dept}}});
    if(error){setBtn('su-btn',false,'Create Account →');toast(error.message,'err');return;}
    if(data.user){
        const user=await ensureProfile(data.user.id,email,{name,school,class:cls,department:dept});
        if(user){
            localStorage.setItem('aou_user',JSON.stringify(user));
            if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
            await sb.from('users').update({last_seen:new Date().toISOString()}).eq('id',user.id);
            toast('Account created! Welcome 🎉','ok'); setTimeout(()=>window.location.href='everyone.html',900);
        }
        else{setBtn('su-btn',false,'Create Account →');toast('Account created! Please sign in.','ok'); setTimeout(()=>sw('in'),1800);}
    }
}
window.openForgotModal = () => { document.getElementById('forgotModal').classList.add('show'); };
window.closeForgotModal = () => { document.getElementById('forgotModal').classList.remove('show'); };
window.forgotPassword = async () => {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { toast('Enter your email address', 'err'); return; }
    setBtn('forgotBtn', true, 'Send Reset Link →');
    const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://discovr-theta.vercel.app/reset.html'
    });
    setBtn('forgotBtn', false, 'Send Reset Link →');
    if (error) { toast(error.message, 'err'); } else { toast('Check your email for the reset link!', 'ok'); closeForgotModal(); }
};
function addPasswordToggles() {
    const passwordFields = [{ input: document.getElementById('li-pass') }, { input: document.getElementById('su-pass') }];
    passwordFields.forEach(item => {
        const input = item.input; if (!input) return;
        const parent = input.closest('.field'); if (!parent || parent.querySelector('.password-toggle')) return;
        const toggle = document.createElement('span'); toggle.className = 'password-toggle';
        toggle.innerHTML = '<i class="far fa-eye"></i>'; let isVisible = false;
        toggle.addEventListener('click', (e) => { e.preventDefault(); isVisible = !isVisible; input.type = isVisible ? 'text' : 'password'; toggle.innerHTML = isVisible ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>'; input.focus(); });
        parent.appendChild(toggle);
    });
}
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='everyone.html';});
document.addEventListener('DOMContentLoaded', addPasswordToggles);
</script>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').then(() => console.log('Service Worker registered')).catch((err) => console.log('SW registration failed:', err)); }
</script>
</body>
</html>
