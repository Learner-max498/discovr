<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Disco">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="theme-color" content="#0e0a1a">
<title>Disco – Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.container { max-width: 900px; width: 100%; margin: 0 auto; }

/* Login Screen */
.login-container {
    max-width: 400px;
    margin: 0 auto;
    background: #111;
    border-radius: 24px;
    padding: 32px;
    border: 1px solid #222;
}
.login-container h1 { text-align: center; margin-bottom: 30px; color: #8c36ff; font-size: 28px; }
.login-container input {
    width: 100%; padding: 14px 16px; margin-bottom: 16px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
    color: white; font-size: 15px; outline: none;
}
.login-container button {
    width: 100%; padding: 16px; background: #8c36ff; color: white;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer;
}
.login-container button:disabled { opacity: 0.6; cursor: not-allowed; }

/* Admin Panel */
.admin-panel { display: none; }
.header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #222;
}
.header h1 { font-size: 26px; font-weight: 700; color: #8c36ff; }
.logout-btn {
    padding: 8px 16px; background: transparent; border: 1px solid #FF4444;
    border-radius: 20px; color: #FF4444; cursor: pointer; font-size: 13px;
}
.stats-bar {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.stat-item {
    flex: 1; min-width: 100px; background: #111; padding: 14px 16px;
    border-radius: 16px; border: 1px solid #222; text-align: center;
    cursor: pointer; transition: border-color 0.2s;
}
.stat-item:hover { border-color: #8c36ff; }
.stat-value { font-size: 24px; font-weight: 700; color: #8c36ff; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; }

.section-title {
    font-size: 18px; font-weight: 600; margin: 24px 0 16px;
    display: flex; align-items: center; gap: 10px;
}
.section-title span { color: #8c36ff; }

.controls {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.search-box { flex: 1; min-width: 180px; }
.search-box input {
    width: 100%; padding: 14px 16px; background: #1a1a1a;
    border: 1px solid #333; border-radius: 12px; color: white;
    font-size: 14px; outline: none;
}
.bulk-actions { display: flex; gap: 8px; }
.bulk-btn {
    padding: 12px 16px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 12px; color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
}
.bulk-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.bulk-btn.danger { background: #2a1a1a; border-color: #FF4444; color: #FF4444; }
.bulk-btn.success { background: #1a2a1a; border-color: #00CC00; color: #00CC00; }

.data-list {
    background: #111; border: 1px solid #222; border-radius: 20px;
    max-height: 350px; overflow-y: auto; margin-bottom: 20px;
}
.list-item {
    display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px;
    border-bottom: 1px solid #222; cursor: pointer;
}
.list-item:hover { background: #161616; }
.list-item.selected {
    background: rgba(140, 54, 255, 0.25);
    border-left: 3px solid #8c36ff;
}

/* ── FIX: single rule covers ALL checkboxes in the panel ── */
.admin-panel input[type="checkbox"] {
    accent-color: #8c36ff;
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

.item-avatar {
    width: 40px; height: 40px; border-radius: 50%; background: #8c36ff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; overflow: hidden; flex-shrink: 0;
}
.item-avatar img { width: 100%; height: 100%; object-fit: cover; }
.item-info { flex: 1; min-width: 0; }
.item-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.item-name { font-weight: 600; font-size: 15px; color: #fff; }
.item-sub { font-size: 12px; color: #aaa; margin: 2px 0; }
.item-message {
    font-size: 14px; color: #ddd; line-height: 1.4; margin: 6px 0 4px;
    word-break: break-word;
}
.item-meta { font-size: 11px; color: #888; }
.badge {
    padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
    display: inline-block;
}
.badge.admin { background: #8c36ff; color: white; }
.badge.disabled { background: #FF4444; color: white; }
.badge.unread { background: #FFAA00; color: black; }
.status-indicator {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px;
}
.status-online { background: #00CC00; box-shadow: 0 0 4px #00CC00; }
.status-offline { background: #666; }

.select-all-bar {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid #222;
}
.selected-count { font-size: 13px; color: #888; }

.loading-spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: #8c36ff;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.list-loading { text-align: center; padding: 40px; color: #888; }
.toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
    z-index: 10000; background: #0D1117; color: white;
}
.toast.success { background: #1B5E20; }
.toast.error { background: #C62828; }

.wp-footer {
    margin-top: 30px;
    text-align: center;
}
.pw-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    animation: footerFloat 3s ease-in-out infinite;
}
.w-small {
    display: inline-block;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -2px;
    transform: scaleX(1.2);
    color: #8c36ff;
    text-shadow: 0 0 5px rgba(140, 54, 255, 0.3);
    line-height: 1;
}
.p-small {
    display: inline-block;
    font-size: 1.8rem;
    font-weight: 900;
    margin-left: -3px;
    position: relative;
    color: #8c36ff;
    text-shadow: 0 0 5px rgba(140, 54, 255, 0.3);
    line-height: 1;
}
.p-small::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 2px;
    width: 7px;
    height: 7px;
    background: #8c36ff;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(140, 54, 255, 0.5);
}
@keyframes footerFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
}
</style>
</head>
<body>
<div class="container">
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h1>Admin Login</h1>
        <input type="email" id="adminEmail" placeholder="Admin Email" autocomplete="email">
        <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password">
        <button id="loginBtn" onclick="adminLogin()">Sign In →</button>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:#888;">
            <a href="index.html" style="color:#8c36ff;">← Back to app</a>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="header">
            <h1>Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item" onclick="scrollToSection('users')"><div class="stat-value" id="totalUsers">-</div><div class="stat-label">Total Users</div></div>
            <div class="stat-item" onclick="scrollToSection('users')"><div class="stat-value" id="activeUsers">-</div><div class="stat-label">Active</div></div>
            <div class="stat-item" onclick="scrollToSection('users')"><div class="stat-value" id="disabledUsers">-</div><div class="stat-label">Disabled</div></div>
            <div class="stat-item" onclick="scrollToSection('users')"><div class="stat-value" id="onlineNow">-</div><div class="stat-label">Online Now</div></div>
            <div class="stat-item" onclick="scrollToSection('posts')"><div class="stat-value" id="totalPosts">-</div><div class="stat-label">Posts</div></div>
            <div class="stat-item" onclick="scrollToSection('messages')"><div class="stat-value" id="totalMessages">-</div><div class="stat-label">Messages</div></div>
            <div class="stat-item" onclick="scrollToSection('feedbacks')"><div class="stat-value" id="totalFeedbacks">-</div><div class="stat-label">Feedbacks</div></div>
            <div class="stat-item" onclick="scrollToSection('feedbacks')"><div class="stat-value" id="unreadFeedbacks">-</div><div class="stat-label">Unread</div></div>
        </div>

        <!-- USERS -->
        <div id="usersSection">
            <div class="section-title"><span>👥</span> Users</div>
            <div class="controls">
                <div class="search-box"><input type="text" id="userSearchInput" placeholder="Search by name or email" oninput="filterUsers()"></div>
                <div class="bulk-actions"><button class="bulk-btn" id="bulkDisableBtn" onclick="bulkDisable()">Disable</button><button class="bulk-btn success" id="bulkEnableBtn" onclick="bulkEnable()">Enable</button><button class="bulk-btn danger" id="bulkDeleteBtn" onclick="bulkDelete()">Delete</button></div>
            </div>
            <div class="data-list">
                <div class="select-all-bar">
                    <input type="checkbox" id="selectAllUsersCheckbox" onchange="toggleSelectAllUsers()">
                    <span class="selected-count" id="selectedUsersCount">0 selected</span>
                    <span id="userListLoadingIndicator" style="margin-left:auto;display:none;"><span class="loading-spinner"></span> Loading...</span>
                </div>
                <div id="userList"></div>
            </div>
        </div>

        <!-- POSTS -->
        <div id="postsSection">
            <div class="section-title"><span>📱</span> Posts</div>
            <div class="controls">
                <div class="search-box"><input type="text" id="postSearchInput" placeholder="Search by content or user" oninput="filterPosts()"></div>
                <div class="bulk-actions"><button class="bulk-btn danger" onclick="bulkDeletePosts()">Delete Selected</button></div>
            </div>
            <div class="data-list">
                <div class="select-all-bar">
                    <input type="checkbox" id="selectAllPostsCheckbox" onchange="toggleSelectAllPosts()">
                    <span class="selected-count" id="selectedPostsCount">0 selected</span>
                    <span id="postListLoadingIndicator" style="margin-left:auto;display:none;"><span class="loading-spinner"></span> Loading...</span>
                </div>
                <div id="postList"></div>
            </div>
        </div>

        <!-- MESSAGES -->
        <div id="messagesSection">
            <div class="section-title"><span>💬</span> Messages</div>
            <div class="controls">
                <div class="search-box"><input type="text" id="msgSearchInput" placeholder="Search by content or user" oninput="filterMessages()"></div>
                <div class="bulk-actions"><button class="bulk-btn danger" onclick="bulkDeleteMessages()">Delete Selected</button></div>
            </div>
            <div class="data-list">
                <div class="select-all-bar">
                    <input type="checkbox" id="selectAllMessagesCheckbox" onchange="toggleSelectAllMessages()">
                    <span class="selected-count" id="selectedMessagesCount">0 selected</span>
                    <span id="msgListLoadingIndicator" style="margin-left:auto;display:none;"><span class="loading-spinner"></span> Loading...</span>
                </div>
                <div id="messageList"></div>
            </div>
        </div>

        <!-- COMMENTS -->
        <div id="commentsSection">
            <div class="section-title"><span>🗨️</span> Comments</div>
            <div class="controls">
                <div class="search-box"><input type="text" id="commentSearchInput" placeholder="Search by content or user" oninput="filterComments()"></div>
                <div class="bulk-actions"><button class="bulk-btn danger" onclick="bulkDeleteComments()">Delete Selected</button></div>
            </div>
            <div class="data-list">
                <div class="select-all-bar">
                    <input type="checkbox" id="selectAllCommentsCheckbox" onchange="toggleSelectAllComments()">
                    <span class="selected-count" id="selectedCommentsCount">0 selected</span>
                    <span id="commentListLoadingIndicator" style="margin-left:auto;display:none;"><span class="loading-spinner"></span> Loading...</span>
                </div>
                <div id="commentList"></div>
            </div>
        </div>

        <!-- FEEDBACKS -->
        <div id="feedbacksSection">
            <div class="section-title"><span>💬</span> Feedback</div>
            <div class="controls">
                <div class="search-box"><input type="text" id="feedbackSearchInput" placeholder="Search feedback..." oninput="filterFeedbacks()"></div>
                <div class="bulk-actions"><button class="bulk-btn success" onclick="bulkMarkRead()">Mark Read</button><button class="bulk-btn" onclick="bulkMarkUnread()">Mark Unread</button><button class="bulk-btn danger" onclick="bulkDeleteFeedbacks()">Delete</button></div>
            </div>
            <div class="data-list">
                <div class="select-all-bar">
                    <input type="checkbox" id="selectAllFeedbacksCheckbox" onchange="toggleSelectAllFeedbacks()">
                    <span class="selected-count" id="selectedFeedbacksCount">0 selected</span>
                    <span id="feedbackListLoadingIndicator" style="margin-left:auto;display:none;"><span class="loading-spinner"></span> Loading...</span>
                </div>
                <div id="feedbackList"></div>
            </div>
        </div>

        <div class="wp-footer"><div class="pw-logo"><span class="w-small">W</span><span class="p-small">P</span></div></div>
    </div>
</div>

<script>
const sb = window.supabase.createClient(
    'https://oyeojlvrjhaymbhohxdq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95ZW9qbHZyamhheW1iaG9oeGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzMxNDYsImV4cCI6MjA5MDk0OTE0Nn0.aL-Y0hXjfpSIfqnwX-CDhoYLu5fsaMZPr6wW_VxxYj8'
);

let currentUser = null;
let allUsers = [], allFeedbacks = [], allPosts = [], allMessages = [], allComments = [];
let selectedUserIds = new Set(), selectedFeedbackIds = new Set(), selectedPostIds = new Set(), selectedMsgIds = new Set(), selectedCommentIds = new Set();
let userMap = new Map();

function showToast(msg, type = 'info') { const existing = document.querySelector('.toast'); if (existing) existing.remove(); const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatDate(iso) { if (!iso) return 'Never'; return new Date(iso).toLocaleString(); }
function isOnline(lastSeen) { return lastSeen && (Date.now() - new Date(lastSeen)) < 2 * 60 * 1000; }
function formatLastSeen(lastSeen) { if (!lastSeen) return 'Never'; if (isOnline(lastSeen)) return 'Online now'; const diffMins = Math.floor((Date.now() - new Date(lastSeen)) / 60000); if (diffMins < 60) return `${diffMins} min ago`; if (diffMins < 1440) return `${Math.floor(diffMins / 60)} hours ago`; return new Date(lastSeen).toLocaleDateString(); }
window.scrollToSection = (section) => { document.getElementById(section + 'Section').scrollIntoView({ behavior: 'smooth' }); };

function setUsersLoading(loading) { isLoadingUsers = loading; document.getElementById('userListLoadingIndicator').style.display = loading ? 'inline-flex' : 'none'; ['bulkDisableBtn', 'bulkEnableBtn', 'bulkDeleteBtn', 'selectAllUsersCheckbox'].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = loading; }); }
function setPostsLoading(loading) { isLoadingPosts = loading; document.getElementById('postListLoadingIndicator').style.display = loading ? 'inline-flex' : 'none'; }
function setMessagesLoading(loading) { isLoadingMessages = loading; document.getElementById('msgListLoadingIndicator').style.display = loading ? 'inline-flex' : 'none'; }
function setCommentsLoading(loading) { isLoadingComments = loading; document.getElementById('commentListLoadingIndicator').style.display = loading ? 'inline-flex' : 'none'; }
function setFeedbacksLoading(loading) { isLoadingFeedbacks = loading; document.getElementById('feedbackListLoadingIndicator').style.display = loading ? 'inline-flex' : 'none'; }

let isLoadingUsers = false, isLoadingFeedbacks = false, isLoadingPosts = false, isLoadingMessages = false, isLoadingComments = false;

window.adminLogin = async () => {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    if (!email || !password) { showToast('Enter email and password', 'error'); return; }
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true; loginBtn.innerHTML = '<span class="loading-spinner"></span>Signing in...';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { loginBtn.disabled = false; loginBtn.textContent = 'Sign In →'; showToast(error.message, 'error'); return; }
    const { data: profile } = await sb.from('users').select('id, email, name, is_admin, disabled').eq('id', data.user.id).single();
    if (!profile?.is_admin || profile.disabled) { await sb.auth.signOut(); loginBtn.disabled = false; loginBtn.textContent = 'Sign In →'; showToast('Access denied.', 'error'); return; }
    localStorage.setItem('aou_user', JSON.stringify(profile));
    currentUser = profile;
    await sb.from('users').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
    loginBtn.disabled = false; loginBtn.textContent = 'Sign In →';
    showLoginScreen(false);
    await loadAllData();
    setInterval(async () => { if (currentUser?.id) await sb.from('users').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id); }, 60000);
};

function showLoginScreen(show) { document.getElementById('loginScreen').style.display = show ? 'block' : 'none'; document.getElementById('adminPanel').style.display = show ? 'none' : 'block'; }
window.logout = async () => { await sb.auth.signOut(); localStorage.removeItem('aou_user'); currentUser = null; showLoginScreen(true); };

async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showLoginScreen(true); return false; }
    const { data: profile } = await sb.from('users').select('id, email, name, is_admin, disabled').eq('id', session.user.id).single();
    if (!profile?.is_admin || profile.disabled) { await sb.auth.signOut(); showLoginScreen(true); return false; }
    localStorage.setItem('aou_user', JSON.stringify(profile));
    currentUser = profile;
    showLoginScreen(false);
    await loadAllData();
    setInterval(async () => { if (currentUser?.id) await sb.from('users').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id); }, 60000);
    return true;
}

async function loadAllData() {
    await loadUsers();
    await loadPosts();
    await loadMessages();
    await loadComments();
    await loadFeedbacks();
    updateStats();
}

async function loadUsers() {
    setUsersLoading(true);
    const { data: users, error } = await sb.from('users').select('*').order('created_at', { ascending: false });
    setUsersLoading(false);
    if (error) { console.error(error); return; }
    allUsers = (users || []).filter(u => u.id !== currentUser?.id);
    userMap.clear();
    allUsers.forEach(u => userMap.set(u.id, u));
    selectedUserIds.clear();
    filterUsers();
}
async function loadPosts() {
    setPostsLoading(true);
    const { data: posts, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    setPostsLoading(false);
    if (error) { console.error(error); return; }
    allPosts = posts || [];
    selectedPostIds.clear();
    filterPosts();
}
async function loadMessages() {
    setMessagesLoading(true);
    const { data: msgs, error } = await sb.from('messages').select('*').order('created_at', { ascending: false });
    setMessagesLoading(false);
    if (error) { console.error(error); return; }
    allMessages = msgs || [];
    selectedMsgIds.clear();
    filterMessages();
}
async function loadComments() {
    setCommentsLoading(true);
    const { data: comments, error } = await sb.from('comments').select('*').order('created_at', { ascending: false });
    setCommentsLoading(false);
    if (error) { console.error(error); return; }
    allComments = comments || [];
    selectedCommentIds.clear();
    filterComments();
}
async function loadFeedbacks() {
    setFeedbacksLoading(true);
    const { data: feedbacks, error } = await sb.from('feedbacks').select('*').order('created_at', { ascending: false });
    setFeedbacksLoading(false);
    if (error) { console.error(error); return; }
    allFeedbacks = feedbacks || [];
    selectedFeedbackIds.clear();
    filterFeedbacks();
}

function updateStats() {
    const total = allUsers.length;
    const active = allUsers.filter(u => !u.disabled).length;
    const disabled = total - active;
    const online = allUsers.filter(u => isOnline(u.last_seen)).length;
    document.getElementById('totalUsers').textContent = total;
    document.getElementById('activeUsers').textContent = active;
    document.getElementById('disabledUsers').textContent = disabled;
    document.getElementById('onlineNow').textContent = online;
    document.getElementById('totalPosts').textContent = allPosts.length;
    document.getElementById('totalMessages').textContent = allMessages.length;
    document.getElementById('totalFeedbacks').textContent = allFeedbacks.length;
    document.getElementById('unreadFeedbacks').textContent = allFeedbacks.filter(f => !f.is_read).length;
}

// Users
function filterUsers() {
    const term = document.getElementById('userSearchInput').value.toLowerCase();
    const filtered = allUsers.filter(u => (u.name?.toLowerCase().includes(term)) || (u.email?.toLowerCase().includes(term)) || (u.school?.toLowerCase().includes(term)));
    renderUserList(filtered);
}
function renderUserList(users) {
    const container = document.getElementById('userList');
    if (!users.length) { container.innerHTML = '<div class="list-loading">No users found</div>'; return; }
    container.innerHTML = users.map(user => {
        const isSelected = selectedUserIds.has(user.id);
        const avatar = user.avatar_url ? `<img src="${user.avatar_url}">` : (user.initials || user.name?.charAt(0) || '?');
        const disabledBadge = user.disabled ? '<span class="badge disabled">DISABLED</span>' : '';
        const adminBadge = user.is_admin ? '<span class="badge admin">ADMIN</span>' : '';
        const online = isOnline(user.last_seen);
        const statusClass = online ? 'status-online' : 'status-offline';
        const lastSeenText = formatLastSeen(user.last_seen);
        return `<div class="list-item ${isSelected ? 'selected' : ''}" onclick="toggleUser('${user.id}')">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleUser('${user.id}')">
            <div class="item-avatar">${avatar}</div>
            <div class="item-info">
                <div class="item-name-row"><span class="status-indicator ${statusClass}"></span><span class="item-name">${escapeHtml(user.name || 'Unknown')}</span>${adminBadge}${disabledBadge}</div>
                <div class="item-sub">${escapeHtml(user.email)}</div>
